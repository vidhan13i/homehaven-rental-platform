# ─── gateway/nginx.conf ─────────────────────────────────────────────────────
#
# What is Nginx doing here?
# ---------------------------
# Nginx is a "reverse proxy" — it sits in front of all your Django services.
# When a request comes in to /api/listings/, Nginx forwards it to the
# listings_service container. The client (browser/app) never talks directly
# to Django — it only ever sees Nginx on port 8000.
#
# 'upstream' blocks: Define backend server groups Nginx can route to.
# The server names (e.g. "listings_service") are Docker container names —
# Docker's internal DNS resolves them automatically within the network.

upstream listings_service {
    server listings_service:8000;
}

upstream profile_service {
    server profile_service:8000;
}

upstream application_service {
    server application_service:8000;
}

upstream building_service {
    server building_service:8000;
}

upstream reviews_service {
    server reviews_service:8000;
}

server {
    # Nginx listens on port 80 inside the container.
    # docker-compose maps host port 8000 → container port 80.
    listen 80;

    # Increase max upload size for documents/images
    client_max_body_size 20M;

    # ─── API Routes ──────────────────────────────────────────────────────────

    # /api/listings/ → listings_service Django app
    location /api/listings/ {
        proxy_pass http://listings_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /api/profiles/ → profile_service Django app
    location /api/profiles/ {
        proxy_pass http://profile_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /api/applications/ → application_service Django app
    location /api/applications/ {
        proxy_pass http://application_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /api/buildings/ → building_service Django app
    location /api/buildings/ {
        proxy_pass http://building_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # /api/reviews/ → reviews_service Django app
    location /api/reviews/ {
        proxy_pass http://reviews_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Admin Routes (Django built-in admin panel for each service) ─────────
    # Each service has its own /admin/ page. We expose them via the gateway
    # at /admin/<service-name>/ so you don't need to access internal ports.

    location /admin/listings/ {
        proxy_pass http://listings_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/buildings/ {
        proxy_pass http://building_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/reviews/ {
        proxy_pass http://reviews_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/profiles/ {
        proxy_pass http://profile_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/applications/ {
        proxy_pass http://application_service/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Health Check ────────────────────────────────────────────────────────
    # A simple endpoint to verify the gateway itself is alive
    location /health/ {
        return 200 '{"status": "gateway running"}';
        add_header Content-Type application/json;
    }
}
