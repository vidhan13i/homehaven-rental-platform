# ─── gateway/nginx.conf ─────────────────────────────────────────────────────

upstream listings_service {
    server listings_service:8000;
}

upstream profile_service {
    server profile_service:8000;
}

upstream application_service {
    server application_service:8000;
}

upstream building_service {
    server building_service:8000;
}

upstream reviews_service {
    server reviews_service:8000;
}

upstream auth_service {
    server auth_service:8000;
}

upstream chat_service {
    server chat_service:8000;
}

upstream notification_service {
    server notification_service:8000;
}

server {
    listen 80;
    client_max_body_size 20M;

    # ─── API Routes ──────────────────────────────────────────────────────────

    # /api/listings/ → listings_service Django app
    location /api/listings/ {
        proxy_pass http://listings_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /api/profiles/ → profile_service Django app
    location /api/profiles/ {
        proxy_pass http://profile_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /api/applications/ → application_service Django app
    location /api/applications/ {
        proxy_pass http://application_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /api/buildings/ → building_service Django app
    location /api/buildings/ {
        proxy_pass http://building_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /api/reviews/ → reviews_service Django app
    location /api/reviews/ {
        proxy_pass http://reviews_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /api/auth/ → auth_service Django app
    location /api/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /api/chat/ → chat_service REST API
    location /api/chat/ {
        proxy_pass http://chat_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /ws/chat/ → chat_service WebSocket (Django Channels / Daphne)
    # WebSocket upgrade requires Upgrade + Connection headers.
    # proxy_read_timeout 3600s keeps idle WS connections alive (default 60s would kill them).
    location /ws/chat/ {
        proxy_pass http://chat_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # /api/notifications/ → notification_service REST API
    location /api/notifications/ {
        proxy_pass http://notification_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # /ws/notifications/ → notification_service WebSocket
    location /ws/notifications/ {
        proxy_pass http://notification_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # /static/ → listings_service for serving admin & DRF static assets (CSS, JS)
    location /static/ {
        proxy_pass http://listings_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # ─── Admin Routes (Django built-in admin panel for each service) ─────────

    location /admin/listings/ {
        proxy_pass http://listings_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    location /admin/buildings/ {
        proxy_pass http://building_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    location /admin/reviews/ {
        proxy_pass http://reviews_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    location /admin/profiles/ {
        proxy_pass http://profile_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    location /admin/applications/ {
        proxy_pass http://application_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    location /admin/auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port 8000;
    }

    # ─── Health Check ────────────────────────────────────────────────────────
    location /health/ {
        return 200 '{"status": "gateway running"}';
        add_header Content-Type application/json;
    }
}
