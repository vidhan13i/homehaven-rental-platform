name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: "3.12"

jobs:
  code-quality:
    name: Code Quality (Ruff & Black)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          
      - name: Install Linters
        run: pip install ruff black

      - name: Run Ruff
        run: ruff check .

      - name: Run Black
        run: black --check .

  backend-tests:
    name: Backend Tests - ${{ matrix.service }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    strategy:
      fail-fast: false # Continues testing all services even if one fails
      matrix:
        service:
          - auth_service
          - profile_service
          - listings_service
          - building_service
          - application_service
          - reviews_service
          - chat_service
          - notification_service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Service Dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          # Install production requirements
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Install testing libraries
          pip install pytest pytest-django pytest-cov

      - name: Run Pytest and Generate Coverage
        id: run_tests
        working-directory: ./${{ matrix.service }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: dummy-test-secret-key
          JWT_SECRET_KEY: dummy-jwt-secret-key
          DB_HOST: localhost
          DB_PORT: 5432
          DB_PASSWORD: test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          CHANNEL_LAYERS_REDIS_URL: redis://localhost:6379/3
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
        run: |
          pytest --nomigrations --cov=. --cov-report=xml --junitxml=pytest-report.xml -v || ret=$?
          if [ "${ret:-0}" -eq 5 ]; then
            echo "No tests found (Exit code 5). Passing gracefully."
            exit 0
          elif [ "${ret:-0}" -ne 0 ]; then
            exit $ret
          fi

      - name: Handle Test Failure Output
        if: failure() && steps.run_tests.outcome == 'failure'
        run: |
          echo "::error::Service ${{ matrix.service }} failed tests."
          echo "Pytest output should be reviewed in the logs above."
          cat ./${{ matrix.service }}/pytest-report.xml || true

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: ./${{ matrix.service }}/coverage.xml
          retention-days: 14

      - name: Upload Pytest Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-report-${{ matrix.service }}
          path: ./${{ matrix.service }}/pytest-report.xml
          retention-days: 14

  coverage:
    name: Global Coverage
    needs: [backend-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Install Coverage
        run: pip install coverage

      - name: Generate Global Coverage XML
        run: |
          coverage combine || echo "No coverage data to combine"
          coverage xml -o coverage.xml || echo "Failed to generate XML"

      - name: Upload Global Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: global-coverage
          path: coverage.xml
          retention-days: 14

  docker-build:
    name: Docker Build Validation - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth_service
          - profile_service
          - listings_service
          - building_service
          - application_service
          - reviews_service
          - chat_service
          - notification_service
          - gateway
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: ${{ matrix.service }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
