# ─── docker-compose.yml ──────────────────────────────────────────────────────
#
# HomeHaven Rental Platform — Full Microservices Stack
#
# Architecture: Hybrid Event-Driven + REST
#   - Nginx Gateway: single entry point for all HTTP/WS traffic
#   - PostgreSQL: one server hosting all 9 isolated databases
#   - Redis: Celery broker/result + Django Channels layer
#   - Apache Kafka + Zookeeper: domain event bus
#   - Notification Service: independent service with own DB, Celery, WebSocket
#
# Start everything: docker compose up --build

services:

  # ─── ZOOKEEPER ─────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: haven_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - rental_network

  # ─── APACHE KAFKA ──────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: haven_kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - rental_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── POSTGRESQL DATABASE ───────────────────────────────────────────────────
  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    networks:
      - rental_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── REDIS ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - rental_network
    restart: unless-stopped

  # ─── NGINX GATEWAY ─────────────────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8000:80"
    depends_on:
      - listings_service
      - profile_service
      - application_service
      - building_service
      - reviews_service
      - auth_service
      - chat_service
      - notification_service
      - redis
    networks:
      - rental_network
    restart: unless-stopped

  # ─── AUTH SERVICE ──────────────────────────────────────────────────────────
  auth_service:
    build: ./auth_service
    container_name: auth_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── PROFILE SERVICE ───────────────────────────────────────────────────────
  profile_service:
    build: ./profile_service
    container_name: profile_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rental_network
    restart: unless-stopped

  # ─── PROFILE CELERY WORKER ─────────────────────────────────────────────────
  celery_worker:
    build: ./profile_service
    container_name: celery_worker
    command: celery -A celery_app worker --loglevel=info
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rental_network
    restart: unless-stopped

  # ─── LISTINGS SERVICE ──────────────────────────────────────────────────────
  listings_service:
    build: ./listings_service
    container_name: listings_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── APPLICATION SERVICE ───────────────────────────────────────────────────
  application_service:
    build: ./application_service
    container_name: application_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── BUILDING SERVICE ──────────────────────────────────────────────────────
  building_service:
    build: ./building_service
    container_name: building_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── REVIEWS SERVICE ───────────────────────────────────────────────────────
  reviews_service:
    build: ./reviews_service
    container_name: reviews_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── CHAT SERVICE ─────────────────────────────────────────────────────────
  chat_service:
    build: ./chat_service
    container_name: chat_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/chat/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── CHAT CELERY WORKER ───────────────────────────────────────────────────
  chat_celery:
    build: ./chat_service
    container_name: chat_celery
    command: celery -A celery_app worker --loglevel=info -Q chat_notifications
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── CHAT KAFKA CONSUMER ─────────────────────────────────────────────────
  # Consumes ApplicationApproved → auto-creates renter-agent conversation.
  chat_kafka_consumer:
    build: ./chat_service
    container_name: chat_kafka_consumer
    command: python manage.py run_kafka_consumers
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── NOTIFICATION SERVICE ─────────────────────────────────────────────────
  # Completely independent microservice.
  # Own DB (notification_db), own Celery, own Channels WebSocket server.
  notification_service:
    build: ./notification_service
    container_name: notification_service
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/notifications/health/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NOTIFICATION CELERY WORKER ──────────────────────────────────────────
  notification_celery:
    build: ./notification_service
    container_name: notification_celery
    command: celery -A celery_app worker --loglevel=info -Q notifications,email_delivery
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── NOTIFICATION KAFKA CONSUMER ─────────────────────────────────────────
  # Runs all Kafka consumer threads for the notification service.
  # Consumes: UserRegistered, ApplicationCreated/Approved/Rejected,
  #           MessageSent, ReviewCreated, ListingCreated
  notification_kafka_consumer:
    build: ./notification_service
    container_name: notification_kafka_consumer
    command: python manage.py run_kafka_consumers
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
    volumes:
      - ./shared_lib:/app/shared_lib
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped


# ─── VOLUMES ───────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:

# ─── NETWORKS ──────────────────────────────────────────────────────────────
networks:
  rental_network:
    driver: bridge
