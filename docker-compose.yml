# ─── docker-compose.yml ──────────────────────────────────────────────────────
#
# What is docker-compose?
# ─────────────────────────
# docker-compose is a tool that lets you define and run MULTIPLE Docker
# containers as one unified system. This file describes:
#   - What containers to run (services)
#   - How they connect to each other (networks)
#   - Where to persist data (volumes)
#   - What environment variables each container gets
#
# Run everything with: docker compose up --build

services:

  # ─── POSTGRESQL DATABASE ───────────────────────────────────────────────────
  # One PostgreSQL server hosting all 5 databases.
  # The init_db.sql script creates all 5 databases on first boot.
  db:
    image: postgres:15          # Official PostgreSQL 15 image from Docker Hub
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: postgres     # Default DB (each service has its own too)
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Data persists across restarts
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql  # Runs on first boot
    ports:
      - "5432:5432"             # Expose to your Mac for DB GUI tools (TablePlus, etc.)
    networks:
      - rental_network
    healthcheck:                # Wait until postgres is actually ready before starting services
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── NGINX GATEWAY ─────────────────────────────────────────────────────────
  # The "App over it" — single entry point for all requests.
  # Forwards /api/listings/ → listings_service, etc.
  gateway:
    build: ./gateway
    container_name: gateway
    ports:
      - "8000:80"               # Your Mac's port 8000 → Nginx port 80 inside container
    depends_on:
      - listings_service
      - profile_service
      - application_service
      - building_service
      - reviews_service
      - auth_service
    networks:
      - rental_network
    restart: unless-stopped     # Restart automatically if it crashes

  # ─── LISTINGS SERVICE ──────────────────────────────────────────────────────
  # Handles: Listings, Units, Agents, Agent Images, Listing Images
  listings_service:
    build: ./listings_service   # Docker builds this image from listings_service/Dockerfile
    container_name: listings_service
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db              # 'db' is the container name of PostgreSQL above
      - DB_PORT=5432            # Internal Docker port (not the 5432 exposed to Mac)
      - DB_PASSWORD=postgres123
      - SECRET_KEY=listings-super-secret-key-replace-this
      - JWT_SECRET_KEY=shared-jwt-secret-key-12345
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy  # Wait for postgres to be healthy first
    networks:
      - rental_network
    restart: unless-stopped

  # ─── PROFILE SERVICE ───────────────────────────────────────────────────────
  # Handles: User Profiles, Email OTP Verification
  profile_service:
    build: ./profile_service
    container_name: profile_service
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=postgres123
      - SECRET_KEY=profile-super-secret-key-replace-this
      - JWT_SECRET_KEY=shared-jwt-secret-key-12345
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── APPLICATION SERVICE ───────────────────────────────────────────────────
  # Handles: Rental Applications, Applicant Profiles, Documents
  application_service:
    build: ./application_service
    container_name: application_service
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=postgres123
      - SECRET_KEY=application-super-secret-key-replace-this
      - JWT_SECRET_KEY=shared-jwt-secret-key-12345
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── BUILDING SERVICE ──────────────────────────────────────────────────────
  # Handles: Buildings, Building Images, Amenities, RERA verification
  building_service:
    build: ./building_service
    container_name: building_service
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=postgres123
      - SECRET_KEY=building-super-secret-key-replace-this
      - JWT_SECRET_KEY=shared-jwt-secret-key-12345
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── REVIEWS SERVICE ───────────────────────────────────────────────────────
  # Handles: Crowdsourced Tenant Reviews, Ratings (Openigloo's core feature)
  reviews_service:
    build: ./reviews_service
    container_name: reviews_service
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=postgres123
      - SECRET_KEY=reviews-super-secret-key-replace-this
      - JWT_SECRET_KEY=shared-jwt-secret-key-12345
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped

  # ─── AUTH SERVICE ──────────────────────────────────────────────────────────
  # Handles: User authentication, JWT issuance, registration
  auth_service:
    build: ./auth_service
    container_name: auth_service
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DB_HOST=db
      - DB_PORT=5432
      - DB_PASSWORD=postgres123
      - SECRET_KEY=auth-super-secret-key-replace-this
      - JWT_SECRET_KEY=shared-jwt-secret-key-12345
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rental_network
    restart: unless-stopped


# ─── VOLUMES ───────────────────────────────────────────────────────────────
# Named volumes persist data even when containers are stopped/rebuilt.
# Without this, all your database data disappears when you run 'docker compose down'!
volumes:
  postgres_data:

# ─── NETWORKS ──────────────────────────────────────────────────────────────
# All containers join 'rental_network' so they can find each other by name.
# e.g. 'db', 'listings_service', 'gateway' are all valid hostnames inside this network.
networks:
  rental_network:
    driver: bridge
